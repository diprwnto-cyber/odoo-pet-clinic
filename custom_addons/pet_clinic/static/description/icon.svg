<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#714B67;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5E83;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="20" fill="url(#bg)"/>
  <!-- Paw print -->
  <g transform="translate(64,64)" fill="white">
    <!-- Main pad -->
    <ellipse cx="0" cy="12" rx="18" ry="15" opacity="0.95"/>
    <!-- Top left toe -->
    <ellipse cx="-20" cy="-10" rx="9" ry="11" transform="rotate(-15, -20, -10)" opacity="0.95"/>
    <!-- Top right toe -->
    <ellipse cx="20" cy="-10" rx="9" ry="11" transform="rotate(15, 20, -10)" opacity="0.95"/>
    <!-- Bottom left toe -->
    <ellipse cx="-12" cy="-28" rx="8" ry="10" transform="rotate(-5, -12, -28)" opacity="0.95"/>
    <!-- Bottom right toe -->
    <ellipse cx="12" cy="-28" rx="8" ry="10" transform="rotate(5, 12, -28)" opacity="0.95"/>
  </g>
  <!-- Plus/medical cross -->
  <g transform="translate(100,28)" fill="white" opacity="0.9">
    <rect x="-3" y="-9" width="6" height="18" rx="2"/>
    <rect x="-9" y="-3" width="18" height="6" rx="2"/>
  </g>
</svg>
